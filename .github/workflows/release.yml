name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Product version without leading v (e.g. 1.2.0). Required for manual runs."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-msi:
    name: Build MSI and publish release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "${{ inputs.version }}".Trim().TrimStart("v", "V")
          } else {
            $tag = "${{ github.ref_name }}"
            if ($tag -notmatch '^v?\d+(\.\d+){1,3}$') {
              throw "Tag '$tag' is not a valid version tag (expected v1.2.3)."
            }
            $v = $tag.TrimStart("v", "V")
          }
          if ($v -notmatch '^\d+(\.\d+){1,3}$') {
            throw "Version '$v' is not a valid MSI ProductVersion."
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Product version: $v"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build MSI installers
        shell: pwsh
        run: |
          .\build-msi.ps1 -Version "${{ steps.ver.outputs.version }}"

      - name: List MSI assets
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath artifacts\msi -Filter "DisplayForge-*.msi" -File |
            ForEach-Object { Write-Host $_.FullName; "{0:N1} MB" -f ($_.Length / 1MB) }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msi-${{ steps.ver.outputs.version }}
          path: artifacts/msi/DisplayForge-*.msi
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msis = @(Get-ChildItem -LiteralPath artifacts\msi -Filter "DisplayForge-*.msi" -File)
          if ($msis.Count -eq 0) { throw "No MSI files found under artifacts/msi" }
          $ghArgs = @(
            "release", "create", "${{ github.ref_name }}",
            "--title", "DisplayForge ${{ steps.ver.outputs.version }}",
            "--generate-notes"
          ) + ($msis | ForEach-Object { $_.FullName })
          & gh @ghArgs

      - name: Manual dispatch note
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          Write-Host "Manual run: MSIs uploaded as workflow artifacts only."
          Write-Host "To publish a GitHub Release, push a tag: git tag v${{ steps.ver.outputs.version }} && git push origin v${{ steps.ver.outputs.version }}"
