name: Release

on:
  workflow_call:
    inputs:
      version:
        description: "Product version without leading v (e.g. 1.2.0)"
        required: true
        type: string
      tag_name:
        description: "Git tag name (e.g. v1.2.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Product version without leading v (e.g. 1.2.0). Required for manual runs."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build-msi:
    name: Build MSI and publish release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          # Reusable workflow sees the *caller's* event_name (often "push"), not "workflow_call".
          # Prefer explicit inputs when present (workflow_call / workflow_dispatch).
          $event = "${{ github.event_name }}"
          $inVersion = "${{ inputs.version }}".Trim()
          $inTag = "${{ inputs.tag_name }}".Trim()

          if ($event -eq "workflow_dispatch") {
            $v = $inVersion.TrimStart("v", "V")
            $tag = "v$v"
          } elseif (-not [string]::IsNullOrWhiteSpace($inVersion)) {
            $v = $inVersion.TrimStart("v", "V")
            $tag = if (-not [string]::IsNullOrWhiteSpace($inTag)) { $inTag } else { "v$v" }
          } else {
            $tag = "${{ github.ref_name }}"
            if ($tag -notmatch '^v?\d+(\.\d+){1,3}$') {
              throw "Tag '$tag' is not a valid version tag (expected v1.2.3)."
            }
            $v = $tag.TrimStart("v", "V")
            if (-not $tag.StartsWith("v")) { $tag = "v$v" }
          }
          if ($v -notmatch '^\d+(\.\d+){1,3}$') {
            throw "Version '$v' is not a valid MSI ProductVersion."
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag_name=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Event: $event"
          Write-Host "Product version: $v"
          Write-Host "Tag name: $tag"

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Build MSI installers
        shell: pwsh
        run: |
          .\build-msi.ps1 -Version "${{ steps.ver.outputs.version }}" -Cultures "en-US;ja-JP"

      - name: List MSI assets
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath artifacts\msi -Filter "DisplayForge-*.msi" -File |
            ForEach-Object { Write-Host $_.FullName; "{0:N1} MB" -f ($_.Length / 1MB) }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: msi-${{ steps.ver.outputs.version }}
          path: artifacts/msi/DisplayForge-*.msi
          if-no-files-found: error

      - name: Attach MSIs to GitHub Release
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.ver.outputs.tag_name }}"
          $version = "${{ steps.ver.outputs.version }}"
          $msis = @(Get-ChildItem -LiteralPath artifacts\msi -Filter "DisplayForge-*.msi" -File)
          if ($msis.Count -eq 0) { throw "No MSI files found under artifacts/msi" }

          # Release Please may already have created the GitHub Release (notes only).
          # Manual tag push may not have a release yet. Support both.
          $exists = $false
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) { $exists = $true }

          if ($exists) {
            Write-Host "Release $tag exists — uploading MSI assets."
            & gh release upload $tag --clobber @($msis | ForEach-Object { $_.FullName })
          } else {
            Write-Host "Release $tag missing — creating with MSI assets."
            $ghArgs = @(
              "release", "create", $tag,
              "--title", "DisplayForge $version",
              "--generate-notes"
            ) + ($msis | ForEach-Object { $_.FullName })
            & gh @ghArgs
          }
          if ($LASTEXITCODE -ne 0) { throw "gh release failed with exit $LASTEXITCODE" }

      - name: Manual dispatch note
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          Write-Host "Manual run: MSIs uploaded as workflow artifacts only."
          Write-Host "To publish a GitHub Release, merge a Release Please PR or push tag v${{ steps.ver.outputs.version }}."
