name: Dependency Review

on:
  pull_request:
    branches: [main, master]

# Requires Dependency graph (Settings → Code security).
# Public repos: enable Dependency graph if this job 404s with GITHUB_TOKEN.
permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          # License enforcement is handled by license-check.yml (nuget-license),
          # the authoritative gate for this project's NuGet dependencies.
          # The deny-licenses option is deprecated upstream (actions/dependency-review-action#997).
