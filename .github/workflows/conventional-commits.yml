name: Conventional Commits

# Enforce Conventional Commits on PR titles (and commits in the PR).
# With squash merges, the PR title becomes the main-branch commit — that is the critical check.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: conventional-commits-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title
    # Dependabot: "Bump …" titles; commits use chore(deps) via dependabot.yml.
    # Release Please (github-actions[bot]): already emits chore(…): release X.Y.Z.
    if: >
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  commit-messages:
    name: Commit messages
    if: >
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate commit messages in PR
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Shared rules with local hook: scripts/validate-commit-subject.sh
          failed=0
          while IFS= read -r subject; do
            if scripts/validate-commit-subject.sh "$subject"; then
              echo "OK: $subject"
            else
              echo "::error::Commit message is not Conventional Commits: $subject"
              failed=1
            fi
          done < <(git log --format=%s "${BASE_SHA}..${HEAD_SHA}")

          if [[ "$failed" -ne 0 ]]; then
            echo ""
            echo "See CONTRIBUTING.md. With squash merge, the PR title must also match."
            echo "Enable the same check locally: pwsh ./scripts/install-git-hooks.ps1"
            exit 1
          fi
