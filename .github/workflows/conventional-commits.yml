name: Conventional Commits

# Enforce Conventional Commits on PR titles (and commits in the PR).
# With squash merges, the PR title becomes the main-branch commit — that is the critical check.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: conventional-commits-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: PR title
    # Dependabot titles are "Bump …"; they use chore(deps) commits via dependabot.yml instead.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  commit-messages:
    name: Commit messages
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate commit messages in PR
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # type(scope)!: description — description required, non-empty
          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-zA-Z0-9._/-]+\))?(!)?: .+'

          failed=0
          while IFS= read -r subject; do
            # Skip merge commits and GitHub merge/revert helpers
            if [[ "$subject" =~ ^Merge\  ]] || [[ "$subject" =~ ^Revert\  ]]; then
              echo "OK (skip): $subject"
              continue
            fi
            if [[ "$subject" =~ $pattern ]]; then
              echo "OK: $subject"
            else
              echo "::error::Commit message is not Conventional Commits: $subject"
              failed=1
            fi
          done < <(git log --format=%s "${BASE_SHA}..${HEAD_SHA}")

          if [[ "$failed" -ne 0 ]]; then
            echo ""
            echo "Use Conventional Commits, for example:"
            echo "  fix: tray icon not restoring window"
            echo "  feat: add monitor identify overlay"
            echo "  chore: update WiX localization"
            echo "  ci: tighten MSI release workflow"
            echo ""
            echo "See CONTRIBUTING.md. With squash merge, the PR title must also match."
            exit 1
          fi
