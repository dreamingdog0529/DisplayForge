name: License Check

# Adapted from oss-project-template (Go go-licenses) for .NET / NuGet packages.
# Scans app/test projects only (WiX installer projects lack a normal assets file on Linux).

on:
  push:
    branches: [main]
    paths:
      - "**/*.csproj"
      - "**/packages.lock.json"
      - "Directory.Packages.props"
      - "nuget.config"
      - ".github/workflows/license-check.yml"
  pull_request:
    paths:
      - "**/*.csproj"
      - "**/packages.lock.json"
      - "Directory.Packages.props"
      - "nuget.config"
      - ".github/workflows/license-check.yml"

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        # WPF projects need this when restoring on non-Windows runners.
        # App project pulls Core via ProjectReference (skip WiX installer projects).
        run: |
          dotnet restore src/DisplayForge/DisplayForge.csproj -p:EnableWindowsTargeting=true
          dotnet restore tests/DisplayForge.Core.Tests/DisplayForge.Core.Tests.csproj

      - name: Install nuget-license
        run: dotnet tool install --global nuget-license

      - name: Check licenses
        shell: bash
        env:
          EnableWindowsTargeting: true
        run: |
          set -euo pipefail
          export PATH="$PATH:$HOME/.dotnet/tools"

          # nuget-license accepts a single -i; scan app + tests (covers product NuGet deps).
          {
            nuget-license -i src/DisplayForge/DisplayForge.csproj -o JsonPretty
            echo ","
            nuget-license -i tests/DisplayForge.Core.Tests/DisplayForge.Core.Tests.csproj -o JsonPretty
          } > /tmp/licenses-parts.txt

          # Concatenate into one JSON array
          python3 - <<'PY' > licenses.json
          import json, re, pathlib
          raw = pathlib.Path("/tmp/licenses-parts.txt").read_text(encoding="utf-8")
          # Split on top-level JSON values separated by our comma line
          chunks = [c.strip().rstrip(",") for c in re.split(r"\n,\n", raw) if c.strip()]
          packages = []
          for chunk in chunks:
              data = json.loads(chunk)
              if isinstance(data, list):
                  packages.extend(data)
              elif isinstance(data, dict):
                  if "packages" in data:
                      packages.extend(data["packages"])
                  else:
                      for k, v in data.items():
                          packages.append({"PackageId": k, **(v if isinstance(v, dict) else {"License": v})})
          json.dump(packages, open("licenses.json", "w", encoding="utf-8"), indent=2)
          print(f"merged {len(packages)} entries from {len(chunks)} projects")
          PY

          echo "## License Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          head -c 20000 licenses.json >> "$GITHUB_STEP_SUMMARY" || true
          echo >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          python3 - <<'PY'
          import json, re, sys
          from pathlib import Path

          text = Path("licenses.json").read_text(encoding="utf-8")
          data = json.loads(text)
          packages = data if isinstance(data, list) else data.get("packages") or data.get("Packages") or []
          if isinstance(data, dict) and not packages:
              packages = [{"PackageId": k, **(v if isinstance(v, dict) else {"License": v})} for k, v in data.items()]

          denied = re.compile(r"\b(GPL-3\.0|AGPL-3\.0|SSPL|BUSL)\b", re.I)
          problems = []
          for p in packages:
              if not isinstance(p, dict):
                  continue
              name = p.get("PackageId") or p.get("Package") or p.get("Id") or p.get("Name") or "?"
              lic = str(
                  p.get("License")
                  or p.get("LicenseExpression")
                  or p.get("license")
                  or p.get("Licenses")
                  or ""
              )
              if denied.search(lic):
                  problems.append(f"{name}: {lic}")

          if problems:
              print("Disallowed licenses detected:")
              for line in problems:
                  print(f"  - {line}")
              sys.exit(1)
          print(f"OK: scanned {len(packages)} package entries; no denied licenses.")
          PY
