name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least privilege: build/test only needs to read the repository contents.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore DisplayForge.sln

      - name: Build
        run: dotnet build DisplayForge.sln -c Release --no-restore

      - name: Test
        run: dotnet test DisplayForge.sln -c Release --no-build --verbosity normal
