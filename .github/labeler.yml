# Configuration for actions/labeler
# Maps file patterns to labels

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**/*"

component/ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**/*"
          - "Taskfile.yml"
          - "lefthook.yml"
          - "scripts/**/*"
          - ".githooks/**/*"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.csproj"
          - "**/packages.lock.json"
          - "Directory.Packages.props"
          - "nuget.config"

component/config:
  - changed-files:
      - any-glob-to-any-file:
          - "*.yml"
          - "*.yaml"
          - "*.json"
          - "*.toml"
          - "release-please-config.json"
          - ".release-please-manifest.json"
          - "version.txt"
          - ".typos.toml"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**/*"
          - "**/*Tests.cs"
          - "**/*Test.cs"

component/ui:
  - changed-files:
      - any-glob-to-any-file:
          - "src/DisplayForge/**/*"

component/core:
  - changed-files:
      - any-glob-to-any-file:
          - "src/DisplayForge.Core/**/*"

component/installer:
  - changed-files:
      - any-glob-to-any-file:
          - "installer/**/*"
          - "build-msi.ps1"

component/tools:
  - changed-files:
      - any-glob-to-any-file:
          - "tools/**/*"
